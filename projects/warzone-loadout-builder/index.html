<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Warzone Loadout Builder</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <h1>🎮 Warzone Loadout Builder</h1>

    <div class="container">
      <h2>Select Your Primary Weapon</h2>

      <select id="weaponSelect">
        <option value="">Choose a weapon</option>
        <option value="M4">M4</option>
        <option value="TAQ-56">TAQ-56</option>
        <option value="Kastov 762">Kastov 762</option>
        <option value="ISO Hemlock">ISO Hemlock</option>
      </select>

      <button id="buildBtn">Build Loadout</button>

      <div id="result"></div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
